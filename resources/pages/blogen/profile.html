<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <script
            src="https://kit.fontawesome.com/52005eadbf.js"
            crossorigin="anonymous"
        ></script>
        <link
            rel="stylesheet"
            href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
            integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="./css/style.css" />
        <title>Blogen</title>
    </head>
    <body>
        <navbar class="navbar navbar-expand-sm navbar-dark bg-dark p-0">
            <div class="container">
                <a href="index.html" class="navbar-brand">Blogen</a>
                <button
                    class="navbar-toggler"
                    data-toggle="collapse"
                    data-target="#myCollapse"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div id="myCollapse" class="collapse navbar-collapse">
                    <ul class="navbar-nav">
                        <li class="nav-item px-1 px-lg-2">
                            <a href="index.html" class="nav-link">Dashboard</a>
                        </li>
                        <li class="nav-item px-1 px-lg-2">
                            <a href="posts.html" class="nav-link">Posts</a>
                        </li>
                        <li class="nav-item px-1 px-lg-2">
                            <a href="categories.html" class="nav-link"
                                >Categories</a
                            >
                        </li>
                        <li class="nav-item px-1 px-lg-2">
                            <a href="users.html" class="nav-link">Users</a>
                        </li>
                    </ul>

                    <ul class="navbar-nav ml-auto">
                        <li class="nav-item dropdown mr-3">
                            <a
                                href="#"
                                class="nav-link dropdown-toggle"
                                data-toggle="dropdown"
                            >
                                <i class="fas fa-user"></i> Welcome Pero
                            </a>
                            <div class="dropdown-menu">
                                <a href="profile.html" class="dropdown-item">
                                    <i class="fas fa-user-circle"></i> Profile
                                </a>
                                <a href="settings.html" class="dropdown-item">
                                    <i class="fas fa-cog"></i> Settings
                                </a>
                            </div>
                        </li>

                        <li class="nav-item">
                            <a href="login.html" class="nav-link">
                                <i class="fas fa-user-times"></i> LogOut</a
                            >
                        </li>
                    </ul>
                </div>
            </div>
        </navbar>

        <header id="main-header" class="py-4 bg-primary text-white">
            <!-- <div class="container">
            <h1><i class="fas fa-cog"></i> Dashboard</h1> 
        </div> -->
            <div class="container">
                <div class="row">
                    <div class="col-md-6">
                        <h1><i class="fas fa-user"></i> Edit Profile</h1>
                    </div>
                </div>
            </div>
        </header>

        <!-- ACTIONS -->
        <section id="actions" class="py-4 mb-4 bg-light">
            <div class="container">
                <div class="row">
                    <div class="col-md-4 text-center">
                        <a href="index.html" class="btn btn-light btn-block">
                            <i class="fas fa-arrow-left"></i> Back To Dashboard
                        </a>
                    </div>
                    <div class="col-md-4 text-center">
                        <a href="index.html" class="btn btn-success btn-block">
                            <i class="fas fa-lock"></i> Change Password
                        </a>
                    </div>
                    <div class="col-md-4 text-center">
                        <a href="index.html" class="btn btn-danger btn-block">
                            <i class="fas fa-trash"></i> Delete Account
                        </a>
                    </div>
                </div>
            </div>
        </section>

        <!-- EDIT PROFILE -->
        <section id="profile">
            <div class="container">
                <div class="row">
                    <div class="col-md-9">
                        <div class="card">
                            <div class="card-header">
                                <h4>Edit Profile</h4>
                            </div>
                            <div class="card-body">
                                <form>
                                    <div class="form-group">
                                        <label for="name">Name</label>
                                        <input
                                            id="name"
                                            type="text"
                                            class="form-control"
                                            value="Pera Peric"
                                        />
                                    </div>

                                    <div class="form-group">
                                        <label for="email">Email</label>
                                        <input
                                            id="email"
                                            type="email"
                                            class="form-control"
                                            value="pera@gmail.com"
                                        />
                                    </div>
                                    <div class="form-group">
                                        <label for="bio">Bio</label>
                                        <textarea name="editor1" id="bio">
                                            Lorem ipsum dolor sit amet consectetur, adipisicing elit. Quam maiores, quia deserunt cumque voluptate ab laudantium iure repudiandae expedita at.
                                        </textarea>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                            <!-- <div class="card-header">
                                <h4>Your Avatar</h4>
                            </div> -->
                            <div class="card-body">
                                <h4>Your Avatar</h4>
                                <img src="./img/avatar.png" alt="Avatar" class="img-fluid mb-4">
                                <button class="btn btn-primary  btn-block">Edit Image</button>
                                <button class="btn btn-danger btn-block">Delete Image</button>
                            </div>
                    </div>
                </div>
            </div>
        </section>

        <footer id="main-footer" class="bg-dark text-white p-3">
            <div class="container">
                <p class="lead text-center m-0">
                    Copyright &copy; <span id="year"></span> Blogen
                </p>
            </div>
        </footer>
        <!-- MODALS -->
        <!-- ADD POST MODAL -->
        <div id="addPostModal" class="modal fade">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header bg-primary text-white">
                        <h5 class="modal-title">Add Post</h5>
                        <button class="close" data-dismiss="modal">
                            <span>&times;</span>
                        </button>
                    </div>
                    <div class="modal-body"></div>
                </div>
            </div>
        </div>
        <!-- ADD CATEGORY MODAL -->
        <div id="addCategoryModal" class="modal fade">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header bg-success text-white">
                        <h5 class="modal-title">Add Category</h5>
                        <button class="close" data-dismiss="modal">
                            <span>&times;</span>
                        </button>
                    </div>
                    <div class="modal-body">
                        <form>
                            <div class="form-group">
                                <label for="title">Title</label>
                                <input type="text" class="form-control" />
                            </div>

                            <div class="modal-footer">
                                <button
                                    type="submit"
                                    class="btn btn-success"
                                    data-dismiss="modal"
                                >
                                    Save Changes
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <!-- ADD USER MODAL -->
        <div id="addUserModal" class="modal fade">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header bg-warning text-white">
                        <h5 class="modal-title">Add User</h5>
                        <button class="close" data-dismiss="modal">
                            <span>&times;</span>
                        </button>
                    </div>
                    <div class="modal-body">
                        <form>
                            <div class="form-group">
                                <label for="name">Name</label>
                                <input
                                    type="text"
                                    id="name"
                                    class="form-control"
                                />
                            </div>
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input
                                    type="email"
                                    id="email"
                                    class="form-control"
                                />
                            </div>
                            <div class="form-group">
                                <label for="pass">Password</label>
                                <input
                                    type="password"
                                    id="pass"
                                    class="form-control"
                                />
                            </div>
                            <div class="form-group">
                                <label for="pass1">Confirm Password</label>
                                <input
                                    type="password"
                                    id="pass1"
                                    class="form-control"
                                />
                            </div>

                            <div class="modal-footer">
                                <button
                                    type="submit"
                                    class="btn btn-warning"
                                    data-dismiss="modal"
                                >
                                    Save Changes
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
            integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"
            integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6"
            crossorigin="anonymous"
        ></script>
        <script src="https://cdn.ckeditor.com/4.13.1/standard/ckeditor.js"></script>
        <script>
            $("#year").text(new Date().getFullYear());
            // inicijalizacija text editora preko textarea tag
            CKEDITOR.replace("editor1");
        </script>
    </body>
</html>
